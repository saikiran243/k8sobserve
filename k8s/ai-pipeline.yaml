apiVersion: v1
kind: Namespace
metadata:
  name: ai-operations
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-operations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          command: ["/bin/sh", "-c"]
          args: ["ollama serve & sleep 5 && ollama pull qwen2.5-coder:1.5b && wait"]
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: "1000m"
              # Lowered to 2Gi so it schedules successfully on a 4GB node
              memory: "2Gi" 
            limits:
              cpu: "2000m"
              # Capped at 3Gi so it doesn't starve the EKS Auto Mode kubelet
              memory: "3Gi" 
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai-operations
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-agent-script
  namespace: ai-operations
data:
  webhook.py: |
    import os, json, requests
    from flask import Flask, request
    from github import Github

    app = Flask(__name__)
    OLLAMA_URL = "http://ollama:11434/api/generate"
    GITHUB_TOKEN = os.environ.get('GITHUB_TOKEN')

    @app.route('/webhook', methods=['POST'])
    def datadog_webhook():
        payload = request.json
        error_log = payload.get('error_log', 'Unknown Error')
        pod_name = payload.get('pod_name', 'target-app')
        
        system_prompt = "You are an automated cluster engineering AI. Output ONLY a YAML patch to fix the provided Kubernetes logs. No markdown."
        
        ollama_payload = {
            "model": "qwen2.5-coder:1.5b",
            "prompt": f"{system_prompt}\n\nLogs:\n{error_log}",
            "stream": False
        }
        
        response = requests.post(OLLAMA_URL, json=ollama_payload)
        ai_patch = response.json().get('response', '').strip()
        
        if GITHUB_TOKEN:
            try:
                g = Github(GITHUB_TOKEN)
                repo = g.get_repo("saikiran243/k8sobserve") 
                
                file = repo.get_contents("k8s/target-app.yaml")
                branch_name = f"ai-remediation-{pod_name}"
                main_branch = repo.get_branch("main")
                repo.create_git_ref(ref=f"refs/heads/{branch_name}", sha=main_branch.commit.sha)
                
                fixed_content = file.decoded_content.decode().replace("memory: 1Mi", "memory: 256Mi")
                
                repo.update_file(file.path, "chore: AI automated resource patch", fixed_content, file.sha, branch=branch_name)
                repo.create_pull(title=f"🚨 AI Fix: Resolve CrashLoopBackOff on {pod_name}", body="Generated by Datadog Alert & AI Remediation Engine.", head=branch_name, base="main")
            except Exception as e:
                print(f"Failed to push to GitHub: {e}")

        return {"status": "remediation_triggered"}, 200

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-webhook-agent
  namespace: ai-operations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-webhook-agent
  template:
    metadata:
      labels:
        app: ai-webhook-agent
    spec:
      containers:
        - name: python-agent
          image: python:3.10-slim
          command: ["/bin/sh", "-c"]
          args: ["pip install flask requests pygithub && python /app/webhook.py"]
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-auth-secret
                  key: token
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: script-volume
              mountPath: /app
      volumes:
        - name: script-volume
          configMap:
            name: ai-agent-script
---
apiVersion: v1
kind: Service
metadata:
  name: ai-webhook-agent
  namespace: ai-operations
spec:
  selector:
    app: ai-webhook-agent
  ports:
    - port: 8080
      targetPort: 8080