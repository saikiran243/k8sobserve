apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: target-app
  template:
    metadata:
      labels:
        app: target-app
    spec:
      containers:
      - name: target-app
        image: nginx:latest
        resources:
          requests:
            memory: "2Mi"
            cpu: "1m"
          limits:
            memory: "2Mi"
            cpu: "1m"